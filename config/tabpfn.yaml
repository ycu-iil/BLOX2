n_iters: 2000
sigma: 1
n_suggestions: 1

features_path: "data/zinc_dft/feature_list_mfp1024.csv"
values_path: "data/zinc_dft/properties.csv"
initial_n_obs: 10

predictor_class: TabPFNPredictor
predictor_args:
  n_estimators: 1
  token_path: data/hf_token.txt

selector_class: BLOX2Selector
selector_args:
  normalize_features: false
  value_normalization: before_pred
  chunk_size: 512
  use_distribution: false

report_interval: 1
scatter_plot_intervals: [2, 5, 20, 50, 200, 500, 2000, 5000, 20000, 50000]
output_dir: "results"